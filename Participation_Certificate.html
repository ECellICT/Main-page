<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Cell Certificate Generator</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e2e8f0,#f1f5f9);
  text-align:center;
  padding:40px;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 20px;
  border:none;
  background:linear-gradient(90deg,#1e40af,#60a5fa);
  color:white;
  border-radius:10px;
  cursor:pointer;
  margin:8px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎓 Generate Certificate</h2>
  <input type="text" id="name" placeholder="Enter your name">
  <br>
  <button onclick="generateCert()">Download Certificate</button>
</div>

<canvas id="canvas" width="1200" height="850"></canvas>

<script>

// ✅ Fetch participant
async function getParticipant(name){
  const res = await fetch("https://opensheet.elk.sh/1FB7SdRrnt8grH2_Vf29mYAIlmFp21cv7vVKqoy2JODE/all");
  const data = await res.json();

  console.log(data); // DEBUG

  return data.find(row => 
    (row.Name || row.name).trim().toLowerCase() === name.toLowerCase()
  );
}

// ✅ Generate certificate with QR
async function generateCert(){

  const name = document.getElementById("name").value.trim();

  if(name === ""){
    alert("Enter your name");
    return;
  }

  const valid = await getParticipant(name);

  if(!valid){
    alert("❌ Name not found!");
    return;
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = "photos/Certificate_p.png";

  img.onload = function(){

    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    const displayName = name.replace(/\b\w/g, c => c.toUpperCase());

    // ✅ FIXED: Proper column access
    const event = valid.Event || valid.event || "Not Provided";
    const festival = "E-Summit'26";

    console.log(displayName, event, festival); // DEBUG

    // 🎯 Draw name
    ctx.font = "bold 55px serif";
    ctx.fillStyle = "#000000";
    ctx.textAlign = "center";

    ctx.fillText(displayName, 850, 400);

    // ✅ QR DATA (JSON — guaranteed full data)
    const qrData = JSON.stringify({
      name: displayName,
      event: event,
      festival: festival
    });

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
      text: qrData,
      width: 120,
      height: 120
    });

    setTimeout(() => {

      const qrImg = qrDiv.querySelector("img");

      //Draw QR on certificate
      ctx.drawImage(qrImg, 950, 200, 120, 120);

      // Download
      const link = document.createElement("a");
      link.download = displayName + "_certificate.png";
      link.href = canvas.toDataURL();
      link.click();

    }, 300);
  }
}

</script>

</body>
</html>
