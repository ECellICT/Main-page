<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Cell Certificate Generator</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e2e8f0,#f1f5f9);
  text-align:center;
  padding:40px;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:20px;
  color:#1e40af;
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 20px;
  border:none;
  background:linear-gradient(90deg,#1e40af,#60a5fa);
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
}

button:hover{
  opacity:0.9;
}

canvas{
  display:none;
}

@font-face {
  font-family: 'BaskervilleCustom';
  src: url('NewBaskervilleStd-Roman.ttf') format('truetype');
}
</style>
</head>

<body>

<div class="container">
  <h2>🎓 Generate Your Certificate</h2>
  <input type="text" id="name" placeholder="Enter your name">
  <button onclick="generateCert()">Download Certificate</button>
</div>

<canvas id="canvas" width="1200" height="850"></canvas>

<script>

async function generateCert(){

  const name = document.getElementById("name").value.trim();

  if(name === ""){
    alert("Please enter your name");
    return;
  }

  try{

    const res = await fetch("https://opensheet.elk.sh/1FB7SdRrnt8grH2_Vf29mYAIlmFp21cv7vVKqoy2JODE/all");
    const data = await res.json();

    // Find participant
    const valid = data.find(row => {
      return Object.values(row)[0].trim().toLowerCase() === name.toLowerCase();
    });

    if(!valid){
      alert("❌ Name not found!");
      return;
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const img = new Image();
    img.src = "photos/Certificate_p.png";

    img.onload = async function(){

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      const displayName = name.replace(/\b\w/g, c => c.toUpperCase());

      await document.fonts.ready;

      // ✅ NAME
      ctx.font = "bold 55px 'BaskervilleCustom', serif";
      ctx.fillStyle = "#1e3a8a";
      ctx.textAlign = "center";
      ctx.shadowColor = "rgba(0,0,0,0.2)";
      ctx.shadowBlur = 3;

      ctx.fillText(displayName, canvas.width/1.4, 404);

      // ✅ EVENT (2nd column)
      const event = Object.values(valid)[1] || "E-Cell Event";

      // ✅ QR DATA
      const qrData = `Name: ${displayName}\nEvent: ${event}`;

      // Create QR
      const qrContainer = document.createElement("div");

      const qr = new QRCode(qrContainer, {
        text: qrData,
        width: 120,
        height: 120
      });

      // Wait for QR render
      setTimeout(() => {

        const qrImg = qrContainer.querySelector("img");

        // ✅ Draw QR on certificate
        ctx.drawImage(qrImg, 950, 620, 120, 120);

        // Download AFTER QR is drawn
        const link = document.createElement("a");
        link.download = displayName + "_certificate.png";
        link.href = canvas.toDataURL();
        link.click();

      }, 300);

    }

  }catch(err){
    alert("Error fetching data. Check sheet link.");
    console.error(err);
  }

}

</script>

</body>
</html>
