<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Cell Certificate</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e2e8f0,#f1f5f9);
  text-align:center;
  padding:40px;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

input, select{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 20px;
  border:none;
  background:linear-gradient(90deg,#1e40af,#60a5fa);
  color:white;
  border-radius:10px;
  cursor:pointer;
  margin:8px;
}

#loading{
  display:none;
  margin-top:10px;
  font-weight:bold;
  color:#1e40af;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎓 Generate Certificate</h2>

  <input type="text" id="name" placeholder="Enter your name">

  <select id="type">
    <option value="">Select Certificate Type</option>
    <option value="Participation">Participation</option>
    <option value="Appreciation">Appreciation</option>
    <option value="Winner">Winner</option>
    <option value="Runner up">Runner up</option>
  </select>

  <button onclick="generateCert()">Download Certificate</button>

  <p id="loading">⏳ Generating certificate... please wait</p>
</div>

<canvas id="canvas" width="1200" height="850"></canvas>

<script>

// 🔥 CACHE DATA
let sheetData = null;

// 🔹 Fetch only once
async function getParticipant(name, type){

  if(!sheetData){
    const res = await fetch("https://opensheet.elk.sh/1FB7SdRrnt8grH2_Vf29mYAIlmFp21cv7vVKqoy2JODE/all");
    sheetData = await res.json();
  }

  return sheetData.find(row => {
    const cell = row[type];
    return cell && cell.trim().toLowerCase() === name.toLowerCase();
  });
}

// 🔹 Text position
function getTextPosition(type){
  switch(type){
    case "Participation": return { x:1000, y:700, size:50 };
    case "Appreciation": return { x:800, y:430, size:52 };
    case "Winner": return { x:800, y:400, size:58 };
    case "Runner up": return { x:800, y:420, size:55 };
    default: return { x:800, y:415, size:50 };
  }
}

// 🔹 QR position
function getQRPosition(type){
  switch(type){
    case "Winner": return {x:900,y:180};
    case "Runner up": return {x:920,y:200};
    default: return {x:950,y:200};
  }
}

// 🔹 Generate certificate
async function generateCert(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;

  if(name === "" || type === ""){
    alert("Enter name and select certificate type");
    return;
  }

  document.getElementById("loading").style.display = "block";

  const valid = await getParticipant(name, type);

  if(!valid){
    alert("❌ Name not found in selected category!");
    document.getElementById("loading").style.display = "none";
    return;
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();

  // 🔥 Different certificates
  if(type === "Participation"){
    img.src = "photos/E-Summit26/Certificates/Participation.png";
  }
  else if(type === "Appreciation"){
    img.src = "photos/E-Summit26/Certificates/Appreciation.png";
  }
  else if(type === "Winner"){
    img.src = "photos/E-Summit26/Certificates/Winner.png";
  }
  else if(type === "Runner up"){
    img.src = "photos/E-Summit26/Certificates/Runner-up.png";
  }

  img.onload = function(){

    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    const displayName = name.replace(/\b\w/g, c => c.toUpperCase());
    const festival = "E-Summit'26";

    const pos = getTextPosition(type);

    ctx.font = `bold ${pos.size}px serif`;
    ctx.fillStyle = "#000000";
    ctx.textAlign = "center";

    ctx.fillText(displayName, pos.x, pos.y);

    const qrData = JSON.stringify({
      name: displayName,
      certificate: type,
      festival: festival
    });

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
      text: qrData,
      width: 120,
      height: 120
    });

    const qrImg = qrDiv.querySelector("img");

    qrImg.onload = () => {

      const qrPos = getQRPosition(type);

      ctx.drawImage(qrImg, qrPos.x, qrPos.y, 120, 120);

      const link = document.createElement("a");
      link.download = displayName + "_" + type + ".png";
      link.href = canvas.toDataURL();
      link.click();

      document.getElementById("loading").style.display = "none";
    };
  }
}

</script>

</body>
</html>
