<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Cell Certificate</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e2e8f0,#f1f5f9);
  text-align:center;
  padding:40px;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
}

input, select{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 20px;
  background:#1e40af;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎓 Generate Certificate</h2>

  <input type="text" id="name" placeholder="Enter your name">

  <select id="type">
    <option value="">Select Certificate Type</option>
    <option value="Participation">Participation</option>
    <option value="Appreciation">Appreciation</option>
    <option value="Winner">Winner</option>
    <option value="Runner up">Runner up</option>
  </select>

  <button onclick="generateCert()">Download Certificate</button>
</div>

<canvas id="canvas" width="1200" height="850"></canvas>

<script>

// 🔹 Fetch
async function getParticipant(name, type){
  const res = await fetch("https://opensheet.elk.sh/1FB7SdRrnt8grH2_Vf29mYAIlmFp21cv7vVKqoy2JODE/all");
  const data = await res.json();

  return data.find(row => {
    const cell = row[type];
    return cell && cell.toString().trim().toLowerCase() === name.toLowerCase();
  });
}

// 🔹 Text position
function getTextPosition(type, canvas){
  const centerX = canvas.width / 2;

  switch(type){
    case "Participation": return { x:centerX, y:435, size:50 };
    case "Appreciation": return { x:centerX, y:365, size:50 };
    case "Winner": return { x:centerX, y:380, size:50 };
    case "Runner up": return { x:centerX, y:380, size:50 };
    default: return { x:centerX, y:415, size:50 };
  }
}

// 🔹 QR position
function getQRPosition(canvas){
  return { x: canvas.width - 250, y:260 };
}

// 🔹 MAIN
async function generateCert(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;

  if(name === "" || type === ""){
    alert("Enter name and select certificate type");
    return;
  }

  const valid = await getParticipant(name, type);

  if(!valid){
    alert("❌ Name not found!");
    return;
  }

  const designation = valid.Designation || "";
  let event = "";
  if (type === "Winner") event = valid.W || "";
  else if (type === "Runner up") event = valid.R || "";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  const basePath = "photos/E-Summit26/Certificates/";

  // 🔥 Image logic (SIMPLE FIX APPLIED)
  if(type === "Participation"){
    img.src = basePath + "Participation.png";
  }
  else if(type === "Appreciation"){

    const designationClean = (designation || "").trim();

    if(designationClean !== ""){
      // ✅ Core
      img.src = basePath + "Core.png";
    } else {
      // ✅ Executive
      img.src = basePath + "Executives.png";
    }
  }
  else if(type === "Winner"){
    img.src = basePath + "Winner.png";
  }
  else if(type === "Runner up"){
    img.src = basePath + "Runner up.png";
  }

  img.onload = function(){

    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    const displayName = name.replace(/\b\w/g, c => c.toUpperCase());
    const festival = "E-Summit'26";

    const pos = getTextPosition(type, canvas);

    // 🎯 Name
    ctx.font = `bold ${pos.size}px serif`;
    ctx.textAlign = "center";
    ctx.fillText(displayName, pos.x, pos.y);

    // 🎯 Below text
    ctx.font = "28px serif";

    if (type === "Appreciation" && designation) {
      ctx.font = `bold ${pos.size}px serif`; // same size as name
      ctx.fillText(designation, pos.x, pos.y + 125);
    }
    }

    if((type === "Winner" || type === "Runner up") && event){
      ctx.fillText(event, pos.x, pos.y + 110);
    }

    // 🎯 QR
    const qrData = JSON.stringify({
      name: displayName,
      certificate: type,
      event: event,
      designation: designation,
      festival: festival
    });

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
      text: qrData,
      width: 120,
      height: 120
    });

    const qrImg = qrDiv.querySelector("img");

    qrImg.onload = () => {

      const qrPos = getQRPosition(canvas);

      ctx.drawImage(qrImg, qrPos.x, qrPos.y, 120, 120);

      const link = document.createElement("a");
      link.download = displayName + "_" + type + ".png";
      link.href = canvas.toDataURL();
      link.click();
    };
  }
}

</script>

</body>
</html>
